name: Build and Deploy Frontend

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  AWS_REGION: ap-south-2
  EC2_TARGET_DIR: /var/www/frontend
  EC2_TAG_NAME: frontend-server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean workspace
        run: |
          rm -rf node_modules
          rm -rf ~/.npm
          rm -rf ~/.cache

      - name: Create .env file
        run: echo "${{ secrets.REACT_ENV_FILE }}" > .env

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Cache Verify
        run: npm cache verify

      - name: Build React App
        run: npm run build

      - name: Archive build
        run: |
          tar -czf frontend.tar.gz -C dist .

      - name: Set release tag
        run: echo "RELEASE_TAG=mhmarbles-${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: MHMarbles_By_QI ${{ github.sha }}
          files: frontend.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --targets Key=tag:Name,Values="${EC2_TAG_NAME}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy frontend via GitHub release" \
            --parameters 'commands=[
              "set -e",
              "RELEASE_URL=https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/frontend.tar.gz",
              "rm -rf /tmp/frontend",
              "mkdir -p /tmp/frontend",
              "curl -L $RELEASE_URL -o /tmp/frontend/frontend.tar.gz",
              "rm -rf '"$EC2_TARGET_DIR"'/*",
              "mkdir -p '"$EC2_TARGET_DIR"'",
              "tar -xzf /tmp/frontend/frontend.tar.gz -C '"$EC2_TARGET_DIR"'",
              "rm -rf /tmp/frontend",
              "ls -la '"$EC2_TARGET_DIR"'"
            ]' \
            --region $AWS_REGION \
            --output text
